<!DOCTYPE html>
<html>
<head>
<title>Movie Form</title>

<style>
body{
    font-family:Arial;
    background-image:url("https://wallpapercave.com/wp/wp5435845.jpg");
    background-size:cover;
    background-repeat:no-repeat;
    background-position:center;
    height:100vh;
    padding:20px;
}

form{
    background:rgba(255,255,255,0.85);
    padding:20px;
    width:300px;
    border-radius:10px;
}

input,select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    background:blue;
    color:white;
    padding:10px;
    border:none;
    width:100%;
}

h1,p{
    color:white;
}
</style>

</head>

<body>

<h1>Latest Movies</h1>

<p>ALL NEW MOVIES</p>

<a target="_blank" href="https://www.1tamilmv.durban/">
<button>Click Me</button>
</a>

<p>Please CLICK TO GET REDIRECTED</p>

<form>

<h2>User Details</h2>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Age</label>
<input type="number" placeholder="Enter your age">

<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Movie Genre</label>
<select>
<option>Horror</option>
<option>Thriller</option>
<option>Drama</option>
<option>Romantic</option>
<option>Psychological</option>
<option>Comedy</option>
</select>

<label>Year</label>
<input type="number" placeholder="Enter year">

<button type="submit">Submit</button>

</form>

</body>
</html>
